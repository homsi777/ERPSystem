====================================================
BUSINESS THINKING
====================================================

While reviewing every screen always ask:

Does this screen represent how a real fabric company works?

Does it reduce accountant effort?

Does it reduce warehouse effort?

Can one click be removed?

Can navigation be avoided?

Can the workflow become simpler?

Never design screens because "ERP systems usually have them."

Design screens because the employee actually needs them.

