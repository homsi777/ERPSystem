Task: ERP PRO - UX First Architecture and Workflow Refinement (No Database Yet)

Project:
ERP PRO

Technology:
C# / WPF (.NET 9)

Business Domain:
Fabric Import from China + Wholesale Fabric Distribution

Current Status:
The ERP shell, navigation, workspace system, right-click actions, and module structure already exist.
Do NOT implement PostgreSQL, Entity Framework, repositories, APIs, or production business logic in this task.

This task is focused entirely on improving the ERP user experience, workflows, screen organization, and daily usability.

Main Objective:
Transform ERP PRO from a collection of screens into a professional workflow-driven ERP where users complete business operations quickly without unnecessary navigation.

====================================================
GENERAL UX PHILOSOPHY
====================================================

The user should never feel that he is moving between disconnected pages.

The ERP should behave like a professional desktop workspace.

Every action should keep the user inside the same working context whenever possible.

Avoid opening new modules if the task can be completed from the current screen.

Reduce clicks.

Reduce navigation.

Reduce user confusion.

Think like:
- Accountant
- Warehouse officer
- Sales employee
- General manager

Not like a software developer.

====================================================
WORKSPACE PHILOSOPHY
====================================================

Every important operation must open inside an internal ERP workspace.

Examples:

Customer
    ↓
Right Click
    ↓
Account Statement
    ↓
Workspace opens

Container
    ↓
Right Click
    ↓
Container Details
    ↓
Workspace opens

Invoice
    ↓
Right Click
    ↓
Invoice Review
    ↓
Workspace opens

Never redirect the user to another module unless absolutely required.

====================================================
REMOVE UI CLUTTER
====================================================

Review every screen.

Remove unnecessary buttons.

Remove duplicated actions.

Replace crowded row buttons with Right Click actions.

Every table should remain visually clean.

Toolbar buttons should only contain the most frequently used operations.

Everything else belongs inside the Right Click menu.

====================================================
MODULE REVIEW
====================================================

Review every module individually.

For every screen ask:

Why does this screen exist?

Who uses it?

How often?

Can the workflow become faster?

Can two screens become one?

Can a modal become a workspace?

Can navigation be removed?

====================================================
